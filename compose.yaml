services:
    postgres:
        image: postgres:17-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-pagequest}
            POSTGRES_USER: ${POSTGRES_USER:-pagequest}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pagequest}
        ports:
            - '${POSTGRES_PORT:-5433}:5432'
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test:
                ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s

    mailpit:
        image: axllent/mailpit:latest
        restart: unless-stopped
        ports:
            - '${MAILPIT_SMTP_PORT:-1025}:1025'
            - '${MAILPIT_UI_PORT:-8025}:8025'

volumes:
    postgres-data:
